name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rspec-tests:
    runs-on: ubuntu-latest
    
    # Spin up a temporary database for the tests to talk to
    # services:
    #   postgres:
    #     image: postgres:15-alpine
    #     env:
    #       POSTGRES_DB: rails_test
    #       POSTGRES_PASSWORD: password
    #     ports: ["5432:5432"]

    # Pass the database credentials into the Rails environment
    env:
      RAILS_ENV: test
      # DATABASE_URL: postgres://postgres:password@localhost:5432/rails_test

    steps:
      - name: Copy code to cloud server
        uses: actions/checkout@v4

      - name: Install Ruby and Gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true # Caches gems so your tests run blazing fast next time

      # - name: Prepare Database Schema
      #   run: bin/rails db:schema:load

      - name: Run RSpec Test Suite
        run: bundle exec rspec
