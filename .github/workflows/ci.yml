name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rspec-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: luca_vre_test # 1. Aligning the raw container database name
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost:5432/luca_vre_test # 2. Universal connection URL

    steps:
      - name: Copy code to cloud server
        uses: actions/checkout@v4

      - name: Install Ruby and Gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up database schema
        run: bin/rails db:test:prepare

      - name: Run RSpec Test Suite
        run: bundle exec rspec
